<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instrument 7 — Calculator</title>
<link rel="stylesheet" href="index.css">
</head>
<body>

<div class="stage" id="stage">
  <div class="brand">INSTRUMENT&nbsp;<span>VII</span> — DESK CALCULATOR</div>
  <div class="calculator" id="calculator">
    <div class="screw tl"></div>
    <div class="screw tr"></div>
    <div class="screw bl"></div>
    <div class="screw br"></div>

    <div class="display-housing">
      <div class="display-op-row" id="opRow">&nbsp;</div>
      <div class="display" id="display">0</div>
      <div class="display-scanlines"></div>
    </div>

    <div class="keys">
      <button class="key op" data-action="clear">AC<span class="sub-label">CE</span></button>
      <button class="key op" data-action="sign">±</button>
      <button class="key op" data-action="percent">%</button>
      <button class="key op" data-action="operator" data-value="÷">÷</button>

      <button class="key" data-action="digit" data-value="7">7</button>
      <button class="key" data-action="digit" data-value="8">8</button>
      <button class="key" data-action="digit" data-value="9">9</button>
      <button class="key op" data-action="operator" data-value="×">×</button>

      <button class="key" data-action="digit" data-value="4">4</button>
      <button class="key" data-action="digit" data-value="5">5</button>
      <button class="key" data-action="digit" data-value="6">6</button>
      <button class="key op" data-action="operator" data-value="−">−</button>

      <button class="key" data-action="digit" data-value="1">1</button>
      <button class="key" data-action="digit" data-value="2">2</button>
      <button class="key" data-action="digit" data-value="3">3</button>
      <button class="key op" data-action="operator" data-value="+">+</button>

      <button class="key zero" data-action="digit" data-value="0">0</button>
      <button class="key" data-action="decimal">.</button>
      <button class="key eq" data-action="equals">=</button>
    </div>

    <div class="footer-label">SN 07-4419 · PRECISION ARITHMETIC UNIT</div>
  </div>
</div>

<script src="index.js"></script>

</body>
</html>
